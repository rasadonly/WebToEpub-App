<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>WebToEpub — Novel Search Engine</title>
    <meta name="description" content="Search supported web novel sites and import them directly into WebToEpub.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="Uwcca-DMQHEtLdjQpQhKWG6GTt4U2Nd6IV4GC47P7Lw" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"></noscript>
    <link rel="stylesheet" href="plugin/css/design-system.css">
    <link rel="stylesheet" href="plugin/css/search.css">
    <link rel="icon" type="image/png" href="plugin/book128.png">
</head>

<body>

    <a href="plugin/popup.html?mode=manual" class="launch-btn">Launch WebToEpub Tool →</a>

    <header>
        <div style="display: flex; align-items: center; justify-content: center; gap: 24px; margin-bottom: 1rem;">
            <img src="plugin/book128.png" alt="WebToEpub Logo"
                style="width: 80px; height: 80px; filter: drop-shadow(0 0 20px var(--primary-glow));">
            <h1 style="margin: 0;">WebToEpub</h1>
        </div>
        <p class="subtitle">Search 550+ supported novel sites and import them with a single click. No more manually
            hunting for URLs.</p>
    </header>

    <div class="search-container">
        <input id="searchEngineQuery" type="text" placeholder="Search for a novel title..." autocomplete="off"
            autofocus>
        <select id="searchEngineSelect">
            <option value="custom">Custom (All Sites)</option>
            <option value="custom_all" selected>Custom + Secondary Sites</option>
            <option value="duckduckgo">DuckDuckGo</option>
            <option value="bing">Bing</option>
            <option value="google">Google</option>
            <option value="yandex">Yandex</option>
        </select>
        <button id="searchEngineGoButton">Search</button>
    </div>

    <!-- Proxy Configuration -->
    <div class="proxy-config">
        <span style="font-size: 0.85rem; color: var(--text-muted); white-space: nowrap; font-weight: 600;">CORS
            PROXY</span>
        <select id="corsProxySelect">
            <option value="custom">Custom URL...</option>
        </select>
        <input id="corsProxyInput" type="text" placeholder="https://your-proxy.com/?url="
            style="display: none; flex: 1;">
        <label
            style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.85rem; color: var(--text-muted); user-select: none;">
            <input type="checkbox" id="enableCorsProxyCheckbox" checked style="accent-color: var(--primary);">
            Enable
        </label>
    </div>

    <div id="searchEngineStatus"></div>

    <section id="searchEngineSection" class="results-wrapper">
        <div id="searchEngineResultsTable">
            <!-- Results populated by script as card-like divs -->
        </div>
    </section>

    <!-- Scripts (defer = download in parallel, execute after parse, before DOMContentLoaded) -->
    <script src="plugin/js/HttpClient.js?v=20260322" defer></script>
    <script src="plugin/js/SiteSearchEngine.js?v=20260322" defer></script>
    <script src="plugin/js/SearchEngineUI.js?v=20260322" defer></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof SearchEngineUI !== "undefined") {
                SearchEngineUI.bindEvents();
            }
            // Pre-build the secondary sites list (~500 entries) during browser idle time
            // so it's ready before the user clicks Search
            if ("requestIdleCallback" in window) {
                requestIdleCallback(() => {
                    if (typeof SiteSearchEngine !== "undefined") {
                        void SiteSearchEngine.SECONDARY_SITES;
                    }
                }, { timeout: 3000 });
            }
        });
    </script>
</body>

</html>
